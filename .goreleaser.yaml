# .goreleaser.yaml — cwctl release pipeline (cliwright GOAL.md §5).
# Replace cwctl / jjuanrivvera / cwctl. Run `goreleaser check` in CI (not only at tag).
version: 2

before:
  hooks: [go mod tidy, ./scripts/completions.sh]

builds:
  - id: cwctl
    main: ./cmd/cwctl
    binary: cwctl
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
    ldflags:
      - -s -w
      - -X {{ .ModulePath }}/internal/version.Version={{ .Version }}
      - -X {{ .ModulePath }}/internal/version.Commit={{ .Commit }}
      - -X {{ .ModulePath }}/internal/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - { goos: windows, formats: [zip] }
    files: [README.md, LICENSE, completions/*]

checksum: { name_template: checksums.txt }

# Docker: a tiny distroless image built from the prebuilt static amd64 binary.
# CI snapshot runs pass --skip=docker (no registry auth on PRs); the real image is built and
# pushed to GHCR at tag time (the release workflow logs in to ghcr.io first).
dockers:
  - id: cwctl
    ids: [cwctl]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/jjuanrivvera/cwctl:{{ .Version }}"
      - "ghcr.io/jjuanrivvera/cwctl:v{{ .Major }}"
      - "ghcr.io/jjuanrivvera/cwctl:latest"
    build_flag_templates:
      - "--label=org.opencontainers.image.title=cwctl"
      - "--label=org.opencontainers.image.description=A fast, scriptable CLI for the full Chatwoot API"
      - "--label=org.opencontainers.image.source=https://github.com/jjuanrivvera/cwctl"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"

# An explicit release block — without it, `goreleaser check` errors on a fresh repo
# ("scm releases: no remote configured to list refs from").
release:
  github: { owner: jjuanrivvera, name: cwctl }
  prerelease: auto

# Homebrew: use homebrew_casks (NOT the deprecated brews:). The cask is cwctl-cli,
# but the binary inside the archive is cwctl — so `binaries:` (plural list) is required,
# and an unsigned arm64 binary is SIGKILL'd by Gatekeeper without the xattr postflight.
homebrew_casks:
  - name: cwctl-cli
    binaries: [cwctl]
    # token required to push the cask cross-repo: the default GITHUB_TOKEN is scoped to this
    # repo only and cannot write to the tap.
    repository: { owner: jjuanrivvera, name: homebrew-cwctl, token: "{{ .Env.HOMEBREW_TAP_TOKEN }}" }
    homepage: https://github.com/jjuanrivvera/cwctl
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cwctl"]

scoops:
  - repository: { owner: jjuanrivvera, name: scoop-cwctl, token: "{{ .Env.HOMEBREW_TAP_TOKEN }}" }   # bucket repo must already exist; cross-repo token

nfpms:
  - formats: [deb, rpm, apk]
    bindir: /usr/bin
    maintainer: jjuanrivvera
    contents:
      - { src: completions/cwctl.bash, dst: /usr/share/bash-completion/completions/cwctl }
      - { src: completions/cwctl.zsh,  dst: /usr/share/zsh/site-functions/_cwctl }
      - { src: completions/cwctl.fish, dst: /usr/share/fish/vendor_completions.d/cwctl.fish }

sboms:
  - artifacts: archive          # syft SBOMs

signs:                          # cosign keyless (needs CI OIDC: permissions id-token: write)
  - cmd: cosign
    artifacts: checksum
    output: true
    args: ["sign-blob", "--yes", "--output-signature=${signature}", "--output-certificate=${certificate}", "${artifact}"]

changelog:
  groups:
    - { title: Features, regexp: '^.*?feat(\(.+\))??!?:.+$', order: 0 }
    - { title: Fixes, regexp: '^.*?fix(\(.+\))??!?:.+$', order: 1 }
    - { title: Performance, regexp: '^.*?perf(\(.+\))??!?:.+$', order: 2 }
  filters:
    exclude: ['^docs:', '^test:', '^chore:', '^ci:', merge conflict, Merge pull request, Merge branch]
